<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morocco 🇲🇦 vs Canada 🇨🇦 Lucky Pair Ticket</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

<h1>🏆 Morocco 🇲🇦 vs Canada 🇨🇦</h1>

<h2>Round of 16</h2>

<p>📅 4 July</p>

<p>🕥 10:30 PM</p>

</header>

<section class="payment">

<h2>Buy Your Ticket</h2>

<img src="images/qr.png" class="qr">

<p>Scan the QR Code to Pay</p>

<p class="price">Ticket Price : ₹_____</p>

</section>

<section class="unlock">

<h2>Enter Match Code</h2>

<input
type="password"
id="code"
placeholder="Enter Code">

<button onclick="unlockTickets()">

Reveal Tickets

</button>

<p id="message"></p>

</section>

<section class="tickets" id="ticketsContainer">
</section>

<h3>🎟 Ticket 1</h3>

<div class="players">

<div class="player">

<img src="images/morocco/player1.png">

<h4>Morocco Player</h4>

</div>

<div class="vs">VS</div>

<div class="player">

<img src="images/canada/player1.png">

<h4>Canada Player</h4>

</div>

</div>

</div>

<!-- More tickets will be added here -->

</section>

<script src="script.js"></script>

</body>
</html>
